<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Rahasia Ahmad & Dea ❤️</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://googleapis.com">
    <link href="https://googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- BACKGROUND EFFECT -->
    <div id="hearts-container"></div>

    <!-- CHAT CONTAINER -->
    <div class="chat-container">
        <!-- Header Chat -->
        <div class="chat-header">
            <img src="img/ahmad.png" alt="Ahmad" class="avatar">
            <div class="user-info">
                <h3>Ahmad AI Bot 🤖</h3>
                <span class="status">Online | Kangen Dea</span>
            </div>
        </div>

        <!-- Room Chat -->
        <div class="chat-box" id="chatBox">
            <div class="message bot-msg">
                <p>Halo Dea! Akhirnya kamu nemu chat rahasia ini. Coba ketik sesuatu, aku bakal bales otomatis! 🤪</p>
                <span class="time" id="initTime">00:00</span>
            </div>
        </div>

        <!-- Input Chat -->
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Ketik pesan untuk Ahmad..." autocomplete="off">
            <button id="sendBtn">Kirim 🚀</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
